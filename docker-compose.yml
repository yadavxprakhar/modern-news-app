version: '3.8'

services:
  # Relational Database Storage (PostgreSQL)
  postgres:
    image: postgres:15-alpine
    container_name: news_postgres
    restart: always
    environment:
      POSTGRES_DB: newsdb
      POSTGRES_USER: newsuser
      POSTGRES_PASSWORD: newsdbpwd
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - news-network

  # High-performance Cache & Rate Limiter (Redis)
  redis:
    image: redis:7-alpine
    container_name: news_redis
    restart: always
    command: redis-server --requirepass redisdbpwd
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - news-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  news-network:
    driver: bridge
