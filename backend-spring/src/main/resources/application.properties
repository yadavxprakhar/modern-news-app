# =======================================================
# Spring Boot User & Bookmarks Microservice Configuration
# =======================================================

# Server network listener port
server.port=${PORT:8082}

# Relational Database connection parameters (PostgreSQL)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/newsdb}
spring.datasource.username=${DB_USERNAME:newsuser}
spring.datasource.password=${DB_PASSWORD:newsdbpwd}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA and Hibernate configurations
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Stateless Session Token Parameters (JWT)
# 256-bit hexadecimal secure signature secret key
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
# Expirations: Access Token = 15 Minutes (900000ms), Refresh Token = 7 Days (604800000ms)
jwt.expiration=900000
jwt.refresh-expiration=604800000

# Swagger Interactive OpenAPI API Specifications Paths
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# =======================================================
# SMTP Email Configuration (Real OTP Dispatch)
# =======================================================
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

